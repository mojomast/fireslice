<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fireslice login</title>
  <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
<main>
  <section class="login-shell">
    <div class="login-copy">
      <p class="eyebrow">fireslice</p>
      <h1>Operate microVMs without losing the thread.</h1>
      <p class="muted">Admin assigns trust and resources. Users launch the slices they need inside those boundaries.</p>
    </div>
    <div class="card login-card">
    <h1>Sign in</h1>
    {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}
    <form method="post" action="/login" class="stack-form">
      <input type="text" name="username" placeholder="username" required>
      <input type="password" name="password" placeholder="password" required>
      <button type="submit">Login</button>
    </form>
    </div>
  </section>
</main>
</body>
</html>
