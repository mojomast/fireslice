<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fireslice terminal</title>
  <link rel="stylesheet" href="/dashboard/static/style.css">
</head>
<body>
<main>
  {{template "nav" .}}
  <section class="hero compact">
    <div>
      <p class="eyebrow">Browser terminal</p>
      <h1>{{index .VM "name"}}</h1>
      <p class="muted">Run shell commands inside this slice without leaving the dashboard.</p>
    </div>
  </section>

  <div class="card terminal-card">
    <form id="terminal-form" class="terminal-form">
      <input id="terminal-input" name="input" type="text" placeholder="Type a shell command, e.g. pwd or ls -la" autocomplete="off" required>
      <button type="submit">Run</button>
    </form>
    <pre id="terminal-output" class="terminal-output">Connected to {{index .VM "name"}}.
</pre>
  </div>
</main>
<script>
const form = document.getElementById('terminal-form')
const input = document.getElementById('terminal-input')
const output = document.getElementById('terminal-output')
form.addEventListener('submit', async (event) => {
  event.preventDefault()
  const command = input.value.trim()
  if (!command) return
  output.textContent += `\n$ ${command}\n`
  input.value = ''
  const body = new URLSearchParams({ input: command })
  const res = await fetch(location.pathname + '/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  })
  const text = await res.text()
  if (!res.ok) {
    output.textContent += `error: ${text}\n`
    return
  }
  try {
    const json = JSON.parse(text)
    output.textContent += (json.output || '') + '\n'
  } catch {
    output.textContent += text + '\n'
  }
  output.scrollTop = output.scrollHeight
})
</script>
</body>
</html>
